name: Android Build - APK & AAB

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Build Release APK & AAB
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Node.js
      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # 3. Install JS dependencies
      - name: Install npm dependencies
        run: npm ci

      # 4. Setup Java 17 (required by Gradle)
      - name: Setup Java JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      # 5. Sync Capacitor web assets into Android project
      - name: Sync Capacitor Android
        run: npx cap sync android

      # 6. Decode keystore from GitHub secret (base64 encoded)
      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/keystore.jks

      # 7. Grant execute permission to Gradle wrapper
      - name: Grant execute permission to Gradle wrapper
        run: chmod +x android/gradlew

      # 8. Build signed Release APK and AAB
      - name: Build Release APK & AAB
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          cd android
          ./gradlew assembleRelease bundleRelease \
            -Pandroid.injected.signing.store.file=${{ github.workspace }}/android/app/keystore.jks \
            -Pandroid.injected.signing.store.password=$KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD

      # 9. Upload APK as artifact
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TopTube-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      # 10. Upload AAB as artifact (for Play Store)
      - name: Upload AAB (Play Store)
        uses: actions/upload-artifact@v4
        with:
          name: TopTube-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30
