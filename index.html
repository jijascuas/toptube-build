<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>TopTube Showcase</title>
  <meta name="description" content="Discover creators and showcase your social channels on TopTube." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="/styles.css" />
  <link rel="manifest" href="/manifest.json" />
</head>
<body>

  <!-- HEADER (Removed as per user request, moved to bottom nav) -->

  <div class="layout">
    <!-- MAIN -->
    <main id="main-content">
      <div id="current-view-header" style="display: flex; justify-content: space-between; align-items: center;">
        <div class="view-info" style="display: flex; align-items: center; gap: 10px;">
          <span id="view-icon"><i class="fa-solid fa-users"></i></span>
          <h1 id="view-title">Creators</h1>
        </div>
        <div id="top-right-auth">
          <div id="auth-buttons" style="display: flex; gap: 5px;">
            <button id="auth-btn-top" class="btn-google" style="padding: 6px 12px; font-size: 0.8rem; border-radius: 20px;">
              <i class="fa-solid fa-user"></i> Sign In
            </button>
          </div>
          <div id="user-menu-top" class="hidden" style="display: flex; align-items: center; gap: 8px; margin-right: 5px;">
            <img id="user-avatar-top" src="" alt="Avatar" style="width:34px; height:34px; border-radius:50%; cursor: pointer; border: 2px solid var(--accent-color);" />
            <button id="logout-btn-top" style="background: none; border: none; color: #ef4444; cursor: pointer; font-size: 1.2rem; margin-left: 5px; padding: 5px;"><i class="fa-solid fa-sign-out-alt"></i></button>
          </div>
        </div>
      </div>

      <!-- PROFILES GRID -->
      <div id="profiles-grid">
        <!-- Dynamic content goes here -->
      </div>
      
      <!-- SWIPE FEED (TIKTOK MODE) -->
      <div id="swipe-feed" class="hidden">
        <!-- Vertical scroll videos -->
      </div>
      
      <!-- EMPTY STATE -->
      <div id="empty-state" class="hidden">
        <i class="fa-regular fa-folder-open"></i>
        <p>No profiles found.</p>
      </div>
    </main>
  </div>

  <!-- BOTTOM NAVIGATION BAR (Mobile) -->
  <nav id="bottom-nav">
    <button id="tiktok-mode-btn-header" class="nav-item active" title="Shorts Feed">
      <i class="fa-solid fa-mobile-screen"></i>
      <span>Shorts</span>
    </button>
    <button id="favorites-btn-header" class="nav-item" title="Favorites">
      <i class="fa-solid fa-star"></i>
      <span>Favorites</span>
    </button>
    <button id="leaderboard-btn-header" class="nav-item" title="Leaderboard">
      <i class="fa-solid fa-trophy"></i>
      <span>Leaderboard</span>
    </button>
    <button id="nav-more-btn" class="nav-item" title="More">
      <i class="fa-solid fa-bars"></i>
      <span>More</span>
    </button>
  </nav>

  <!-- MORE MENU OVERLAY (shown when "More" is tapped) -->
  <div id="more-menu-overlay" class="hidden">
    <div id="more-menu-panel">
      <div class="more-menu-items">
        <button id="my-profile-btn-header" class="more-menu-item hidden">
          <i class="fa-solid fa-video"></i> Edit Profile & Upload
        </button>
        <div class="more-menu-item" style="flex-direction: column; align-items: stretch; padding: 10px; cursor: default;">
          <div style="display: flex; align-items: center; gap: 8px; width: 100%;">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="creator-search-input" placeholder="Search creators..." autocomplete="off" style="width: 100%; padding: 8px; border-radius: 8px; border: 1px solid var(--border-color); background: var(--bg-color); color: var(--text-color);" />
          </div>
          <div id="creator-search-results" style="display: flex; flex-direction: column; max-height: 150px; overflow-y: auto; margin-top: 10px; gap: 5px;"></div>
        </div>
        <a href="https://lnk.bio/jijascuasgames" target="_blank" class="more-menu-item">
          <i class="fa-solid fa-gamepad"></i> jijascuasgames
        </a>
        <a href="privacy.html" target="_blank" class="more-menu-item" id="privacy-policy-btn">
          <i class="fa-solid fa-shield-halved"></i> Privacy Policy
        </a>
        <button id="delete-account-btn" class="more-menu-item hidden" style="color: #ef4444;">
          <i class="fa-solid fa-trash-can"></i> Delete Account
        </button>
      </div>
    </div>
  </div>

  <!-- ============== MODALS ============== -->

  <!-- MY PROFILE MODAL -->
  <div id="profile-setup-modal" class="modal-overlay hidden">
    <div class="modal-box profile-modal-box">
      <button class="modal-close" id="profile-close"><i class="fa-solid fa-xmark"></i></button>
      <div class="modal-header">
        <i class="fa-solid fa-id-card"></i>
        <h2>Edit Profile & YouTube Links</h2>
      </div>
      <form id="profile-form">
        <div class="input-group">
          <label for="profile-nickname">Nickname / Username</label>
          <input type="text" id="profile-nickname" placeholder="e.g. Creator123" maxlength="20" required />
        </div>
        <div class="input-group" style="display: none;">
          <label>Add Platform Links</label>
          <select id="link-platform-select">
            <!-- Populated via JS -->
          </select>
        </div>
        <div class="input-group">
          <input type="url" id="link-url-input" placeholder="https://..." />
          <button type="button" id="add-link-btn" class="btn-secondary">Add Link</button>
        </div>
        <div id="link-error-msg" class="error-msg hidden"></div>
        
        <!-- Added Links List -->
        <ul id="added-links-list" class="added-links"></ul>

        <div class="modal-actions">
          <button type="submit" class="btn-primary">Publish</button>
        </div>
      </form>
    </div>
  </div>

  <!-- EMBEDDED VIEWER MODAL -->
  <div id="embed-modal" class="modal-overlay hidden">
    <div class="modal-box embed-modal-box">
      <button class="modal-close" id="embed-close"><i class="fa-solid fa-xmark"></i></button>
      <div id="embed-container">
        <!-- iframe will be injected here -->
      </div>
    </div>
  </div>

  <!-- PRIVACY POLICY MODAL (fallback for in-app) -->
  <div id="privacy-modal" class="modal-overlay hidden">
    <div class="modal-box" style="max-width: 600px;">
      <button class="modal-close" id="privacy-close"><i class="fa-solid fa-xmark"></i></button>
      <div class="modal-header">
        <i class="fa-solid fa-shield-halved"></i>
        <h2>Privacy Policy</h2>
      </div>
      <div style="color: #94a3b8; line-height: 1.6; max-height: 60vh; overflow-y: auto; padding-right: 10px; margin-top: 20px;">
        <p>Your privacy is important to us. Please visit our full <a href="privacy.html" target="_blank" style="color: #6366f1;">Privacy Policy</a> for details.</p>
        <br>
        <p>Contact: <a href="mailto:jijascuas@gmail.com" style="color: #6366f1;">jijascuas@gmail.com</a></p>
      </div>
    </div>
  </div>

  <!-- Firebase App (the core Firebase SDK) is always required and must be listed first -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <!-- Add Firebase Auth -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <!-- Add Firebase Firestore for real DB logic -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyC1mcqcucownH27SdvLxdYfPJhbdGKbSAI",
      authDomain: "toptube-jijascuas.firebaseapp.com",
      projectId: "toptube-jijascuas",
      storageBucket: "toptube-jijascuas.firebasestorage.app",
      messagingSenderId: "390668245833",
      appId: "1:390668245833:web:85c451eea5604224419898",
      measurementId: "G-J20D2N5R14"
    };
    firebase.initializeApp(firebaseConfig);
  </script>

  <div id="auth-modal" class="hidden" style="position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 10000; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(5px);">
    <div style="background: var(--surface-color); padding: 25px; border-radius: 12px; width: 90%; max-width: 350px; position: relative;">
      <button id="close-auth-modal" style="position: absolute; top: 15px; right: 15px; background: none; border: none; color: var(--text-color); font-size: 1.2rem; cursor: pointer;"><i class="fa-solid fa-xmark"></i></button>
      <h2 style="margin-bottom: 20px; font-size: 1.4rem; text-align: center; font-weight: bold;">Join TopTube</h2>
      <input type="email" id="auth-email" placeholder="Email address" style="width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid var(--border-color); background: var(--bg-color); color: var(--text-color); box-sizing: border-box;">
      <input type="password" id="auth-password" placeholder="Password" style="width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 1px solid var(--border-color); background: var(--bg-color); color: var(--text-color); box-sizing: border-box;">
      <div style="display: flex; gap: 10px; margin-bottom: 15px;">
        <button id="login-email-btn" style="flex: 1; padding: 12px; border-radius: 8px; background: var(--accent-color); color: white; border: none; font-weight: bold; cursor: pointer;">Login</button>
        <button id="register-email-btn" style="flex: 1; padding: 12px; border-radius: 8px; background: transparent; color: var(--accent-color); border: 1px solid var(--accent-color); font-weight: bold; cursor: pointer;">Register</button>
      </div>
      <div style="display: flex; align-items: center; margin-bottom: 15px;">
        <div style="flex: 1; height: 1px; background: var(--border-color);"></div>
        <span style="padding: 0 10px; font-size: 0.9rem; color: #aaa;">OR</span>
        <div style="flex: 1; height: 1px; background: var(--border-color);"></div>
      </div>
      <button id="modal-google-btn" class="btn-google" style="width: 100%; padding: 12px; border-radius: 8px; display: flex; justify-content: center; font-size: 1rem; align-items: center; gap: 10px;">
        <i class="fa-brands fa-google"></i> Sign in with Google
      </button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
